<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request Food - FoodShare AI</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="form-container">
        <div class="form-card">
            <h2>Request Food</h2>
            <form action="dashboard.html" method="POST">
                <div class="input-group">
                    <label for="recipient-name">Recipient Name</label>
                    <input type="text" id="recipient-name" name="recipient-name" required />
                </div>
                <div class="input-group">
                    <label for="food-preference">Food Preference</label>
                    <select id="food-preference" name="food-preference" required>
                        <option value="Vegetarian">Vegetarian</option>
                        <option value="Vegan">Vegan</option>
                        <option value="Halal">Halal</option>
                        <option value="Gluten-Free">Gluten-Free</option>
                        <option value="No Preference">No Preference</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="quantity-needed">Quantity Needed (kg)</label>
                    <input type="number" id="quantity-needed" name="quantity-needed" required />
                </div>
                <button type="submit" class="btn btn-primary">Request</button>
            </form>
        </div>
    </div>
</body>
</html>
