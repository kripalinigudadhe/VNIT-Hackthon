<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donate Food - FoodShare AI</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="form-container">
        <div class="form-card">
            <h2>Donate Food</h2>
            <form action="dashboard.html" method="POST">
                <div class="input-group">
                    <label for="donor-name">Donor Name</label>
                    <input type="text" id="donor-name" name="donor-name" required />
                </div>
                <div class="input-group">
                    <label for="food-type">Food Type</label>
                    <select id="food-type" name="food-type" required>
                        <option value="Fresh Produce">Fresh Produce</option>
                        <option value="Dairy">Dairy</option>
                        <option value="Bakery">Bakery</option>
                        <option value="Canned Goods">Canned Goods</option>
                        <option value="Meat & Protein">Meat & Protein</option>
                        <option value="Prepared Meals">Prepared Meals</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="quantity">Quantity (kg)</label>
                    <input type="number" id="quantity" name="quantity" required />
                </div>
                <div class="input-group">
                    <label for="expiry-date">Expiry Date</label>
                    <input type="date" id="expiry-date" name="expiry-date" required />
                </div>
                <button type="submit" class="btn btn-primary">Donate</button>
            </form>
        </div>
    </div>
</body>
</html>
